# .github/workflows/ci.yml
#
# Continuous Integration for DevPath
# Runs on every pull request and every push to main.
#
# Jobs:
#   lint   — flake8 style checks on all Python files
#   test   — full test suite on Python 3.9, 3.11, and 3.12
#
# Both jobs must pass before a pull request can be merged.
# Contributors receive feedback within ~2 minutes of opening a PR.

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]

jobs:

  # ------------------------------------------------------------------
  # Job 1: Lint
  # Checks Python code style with flake8.
  # Configuration lives in setup.cfg under [flake8].
  # ------------------------------------------------------------------
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Enforce full style rules (config in setup.cfg)
          flake8 . --count --statistics

  # ------------------------------------------------------------------
  # Job 2: Test
  # Runs the full test suite across three Python versions.
  # ------------------------------------------------------------------
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      # Continue testing other versions even if one fails
      fail-fast: false
      matrix:
        python-version: [ "3.9", "3.11", "3.12" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          python tests/test_basic.py

      - name: Run tests with pytest (if available)
        run: |
          pip install pytest --quiet
          pytest tests/ -v --tb=short
        continue-on-error: false
